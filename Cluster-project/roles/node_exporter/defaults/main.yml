---
# 软件包信息
archive: "node_exporter-1.11.1.linux-amd64.tar.gz"  # 压缩包名（与控制节点 soft 目录一致）
binary: "node_exporter"                              # 解压后可执行文件名

# 服务配置
exporter_port: 9100                                  # 监听端口
user: "node_exporter"                                # 运行用户
service_name: "node_exporter"                        # systemd 服务名
extra_args: ""                                       # 额外启动参数（Node 无需）

# 路径（由控制节点 soft 目录拼接，无需修改）
soft_src: "/var/ftp/soft/{{ archive }}"
install_path: "/usr/local/bin/{{ binary }}"
