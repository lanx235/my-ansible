---
- name: 确保 Nginx 扩展配置目录存在
  file:
    path: /etc/nginx/conf.d
    state: directory

- name: 推送 Nginx 核心配置
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: restart nginx

- name: 推送默认站点配置
  template:
    src: default.conf.j2
    dest: /etc/nginx/conf.d/default.conf
  notify: restart nginx

- name: 部署测试页面
  template:
    src: index.php.j2
    dest: "{{ web_root }}/index.php"
  notify: restart nginx

- name: 启动并启用 Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: 启动并启用 PHP-FPM
  systemd:
    name: php-fpm
    state: started
    enabled: yes
