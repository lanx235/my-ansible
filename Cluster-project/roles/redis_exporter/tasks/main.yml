---
- name: 检查 Redis 是否已安装
  command: which redis-server
  register: redis_installed
  ignore_errors: yes

- name: 终止部署（Redis 未安装）
  fail:
    msg: "Redis 未安装，请先安装 Redis。"
  when: redis_installed.rc != 0

- name: 确保 Redis 配置文件存在
  stat:
    path: /etc/redis/redis.conf
  register: redis_conf_stat
  ignore_errors: yes

- name: 如果 Redis 配置文件不存在，跳过 socket 配置（可能是其他路径）
  debug:
    msg: "未找到 /etc/redis/redis.conf，跳过自动配置 socket。"
  when: not redis_conf_stat.stat.exists

# 只有在配置文件存在时才尝试配置 unixsocket
- block:
    - name: 检查 Redis 配置文件中的 Unix socket 设置
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^unixsocket '
        line: "unixsocket {{ redis_socket_path }}"
        backup: yes
      register: socket_config_changed
      notify: restart redis

    - name: 设置 socket 文件权限（允许 redis 组读写）
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^unixsocketperm '
        line: "unixsocketperm 770"
      notify: restart redis

    - name: 确保 socket 目录存在
      file:
        path: "{{ redis_socket_path | dirname }}"
        state: directory
        owner: redis
        group: redis
        mode: 0755
  when: redis_conf_stat.stat.exists

- name: 创建 {{ user }} 用户
  user:
    name: "{{ user }}"
    system: yes
    shell: /bin/false
    create_home: no

- name: 将 {{ user }} 加入 redis 组（读取 socket 所需）
  user:
    name: "{{ user }}"
    groups: redis
    append: yes
  when: redis_conf_stat.stat.exists

# 解压与安装二进制
- name: 删除旧的临时解压目录
  file:
    path: /tmp/redis_exporter_install
    state: absent

- name: 创建临时解压目录
  file:
    path: /tmp/redis_exporter_install
    state: directory
    mode: 0755

- name: 解压 {{ archive }}
  unarchive:
    src: "{{ soft_src }}"
    dest: /tmp/redis_exporter_install
    remote_src: no

- name: 查找二进制文件
  find:
    paths: /tmp/redis_exporter_install
    patterns: "{{ binary }}"
    file_type: file
    recurse: yes
  register: found_binary

- name: 断言找到二进制
  fail:
    msg: "Binary {{ binary }} not found in extracted archive"
  when: found_binary.files | length == 0

- name: 复制二进制到 {{ install_path }}
  copy:
    src: "{{ found_binary.files[0].path }}"
    dest: "{{ install_path }}"
    mode: 0755
    remote_src: yes

- name: 删除临时目录
  file:
    path: /tmp/redis_exporter_install
    state: absent

- name: 删除旧的 systemd 服务文件
  file:
    path: "/etc/systemd/system/{{ service_name }}.service"
    state: absent
  register: service_removed

- name: 部署 systemd 服务文件
  template:
    src: "{{ service_name }}.service.j2"
    dest: "/etc/systemd/system/{{ service_name }}.service"
    owner: root
    group: root
    mode: 0644
  notify: restart {{ service_name }}

- name: 重新加载 systemd
  systemd:
    daemon_reload: yes

- name: 启动并启用服务
  systemd:
    name: "{{ service_name }}"
    state: started
    enabled: yes

- name: 等待 exporter 端口 {{ exporter_port }} 就绪
  wait_for:
    port: "{{ exporter_port }}"
    host: "0.0.0.0"
    timeout: 15
    delay: 2
  register: port_check

- name: 获取 exporter 日志（如果端口未就绪）
  shell: journalctl -u {{ service_name }} -n 20 --no-pager
  register: exporter_log
  when: port_check.failed

- name: 如果端口未就绪，输出日志并失败
  fail:
    msg: "Port {{ exporter_port }} not listening, log:\n{{ exporter_log.stdout }}"
  when: port_check.failed

- name: 验证 metrics 端点
  uri:
    url: "http://localhost:{{ exporter_port }}/metrics"
    status_code: 200
    timeout: 5
  register: metrics_check
  until: metrics_check.status == 200
  retries: 3
  delay: 2
