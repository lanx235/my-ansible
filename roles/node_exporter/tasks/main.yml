---
- name: Create {{ user }} user
  user:
    name: "{{ user }}"
    system: yes
    shell: /bin/false
    create_home: no

- name: Extract {{ archive }} to /tmp
  unarchive:
    src: "{{ soft_src }}"
    dest: /tmp

- name: Find and copy binary to {{ install_path }}
  shell: |
    find /tmp -type f -name "{{ binary }}" | head -1 | xargs -I {} cp {} {{ install_path }}
  args:
    creates: "{{ install_path }}"

- name: Set binary permissions
  file:
    path: "{{ install_path }}"
    owner: root
    group: root
    mode: 0755

- name: Deploy systemd service
  template:
    src: "{{ service_name }}.service.j2"
    dest: "/etc/systemd/system/{{ service_name }}.service"

- name: Clean up temp files
  shell: rm -rf /tmp/{{ archive | replace('.tar.gz','') }}*
  ignore_errors: yes
- name: 立即启动 node_exporter 服务
  systemd:
    name: "{{ service_name }}"
    state: started
    enabled: yes
    daemon_reload: yes
