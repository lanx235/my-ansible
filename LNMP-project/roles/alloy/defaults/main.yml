---
# Alloy 二进制路径（控制节点上的预下载文件）
alloy_local_bin: /usr/local/bin/alloy
alloy_install_path: /usr/local/bin/alloy

# 配置目录
alloy_config_dir: /etc/alloy
alloy_config_file: /etc/alloy/config.alloy

# Loki 服务器地址（通常不变）
loki_endpoint: "http://50.0.0.240:3100/loki/api/v1/push"

# 日志采集目标列表（核心配置）
# 每项包含 path（日志文件路径）、job（标签，用于 Grafana 查询）
log_targets:
  - path: /var/log/messages
    job: syslog
  # Web 集群额外添加 nginx 日志
  # - path: /var/log/nginx/access.log
  #   job: nginx_access
  # - path: /var/log/nginx/error.log
  #   job: nginx_error
  # MySQL 集群添加慢查询日志等
  # - path: /var/log/mysql/mysql-slow.log
  #   job: mysql_slow
